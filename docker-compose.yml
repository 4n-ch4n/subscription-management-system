services:
  security-ms:
    build:
      context: ./security-ms
      dockerfile: Dockerfile
    env_file: .env
    restart: unless-stopped
    networks:
      - subscription-network
    volumes:
      - ./security-ms/src:/security-ms/src
    ports:
      - "3000:3000"

  company-ms:
    build:
      context: ./company-ms
      dockerfile: Dockerfile
    env_file: .env
    restart: unless-stopped
    networks:
      - subscription-network
    volumes:
      - ./company-ms/src:/company-ms/src
    ports:
      - "3001:3001"
    
  subscription-ms:
    build:
      context: ./subscription-ms
      dockerfile: Dockerfile
    env_file: .env 
    restart: unless-stopped
    networks:
      - subscription-network
    volumes:
      - ./subscription-ms/src:/subscription-ms/src
    ports:
      - "3002:3002"

  subscription-db:
    image: postgres:17
    restart: unless-stopped
    networks:
      - subscription-network
    volumes:
      - postgres:/var/lib/postgresql/data
      - ./scripts/postgres-schema:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: ${DB_SUBSCRIPTION_USER}
      POSTGRES_PASSWORD: ${DB_SUBSCRIPTION_PASSWORD}
      POSTGRES_DB: ${DB_SUBSCRIPTION_DATABASE}  
    ports:
      - "5432:5432"
    
  company-db:
    image: mongo:8.0.4
    restart: unless-stopped
    networks:
      - subscription-network
    volumes:
      - mongo:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_MONGO_PASSWORD}
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongodata:
    image: mongo:8.0.4
    restart: "no"
    networks:
      - subscription-network
    volumes:
      - ./scripts/mongo:/scripts
    env_file: .env
    depends_on:
      company-db:
        condition: service_healthy
    command: sh /scripts/import.sh
  
  security-db:
    image: mysql:8.4.3
    restart: unless-stopped
    networks:
      - subscription-network
    volumes:
      - mysql:/var/lib/mysql
      - ./scripts/mysql-schema:/docker-entrypoint-initdb.d
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_USERS_PASSWORD}
      MYSQL_DATABASE: ${DB_USERS_DATABASE}
      MYSQL_USER: ${DB_USERS_USER}
      MYSQL_PASSWORD: ${DB_USERS_PASSWORD}
    ports:
      - "3306:3306"

networks:
  subscription-network:
    driver: bridge

volumes:
  postgres:
  mongo:
  mysql:
